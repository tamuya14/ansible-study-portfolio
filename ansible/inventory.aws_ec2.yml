plugin: amazon.aws.aws_ec2
regions:
  - ap-northeast-1
filters:
  tag:Role: web_server
  instance-state-name: running
  tag:Env: "{{ lookup('env', 'TF_WORKSPACE') }}"
keyed_groups:
  - prefix: tag
    key: tags

groups:
  web_servers: "'web_server' in tags.Role" # Role: web_server のインスタンスを web_servers という名前で登録する

compose:
  ansible_host: instance_id
  ansible_user: " 'ec2-user' "
  ansible_python_interpreter: " '/usr/bin/python3' "
